name: 功能建议
description: 提出薪跳 PayDance 的功能、交互或平台适配建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出建议。薪跳 PayDance 的核心边界是“桌面实时工资看板”：轻量、本地优先、低打扰。

        快捷键、提醒通知、历史图表、打卡考勤、账号同步等方向当前不在产品边界内；如果你的需求接近这些范围，请先说明为什么它仍服务于核心体验。
  - type: textarea
    id: problem
    attributes:
      label: 需求场景
      description: 你在什么情况下需要这个能力？现在的使用阻碍是什么？
      placeholder: 例如：多显示器切换后，迷你悬浮窗口希望能更稳地回到原来的屏幕角落。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 你期待它如何工作？请尽量描述用户可见的行为，而不是只写实现方式。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 可接受的轻量替代方案
      description: 如果完整方案太重，是否有更小的做法也能解决主要问题？
  - type: dropdown
    id: surface
    attributes:
      label: 影响范围
      options:
        - Windows 桌面端
        - 平台适配建议
        - Web Preview
        - 首次配置或设置中心
        - 构建、发布或文档
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可以附草图、竞品参考或你希望避免的体验。
