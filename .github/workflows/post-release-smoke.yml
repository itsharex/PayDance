name: Post-Release Smoke

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: read
  actions: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Verify release assets
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch latest release info
        run: |
          echo "=== Latest Release ==="
          gh release view --repo ${{ github.repository }} --json tagName,name,publishedAt,assets | tee latest-release.json

      - name: Confirm this workflow published a release
        id: public_release
        run: |
          RUN_CREATED="${{ github.event.workflow_run.created_at }}"
          PUBLISHED_AT=$(jq -r '.publishedAt // ""' latest-release.json)

          echo "Release workflow created at: $RUN_CREATED"
          echo "Latest public release published at: $PUBLISHED_AT"

          if [ -z "$PUBLISHED_AT" ] || [ "$PUBLISHED_AT" \< "$RUN_CREATED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new public release was created by this workflow run; skipping published Release smoke."
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Verify latest release exists
        if: steps.public_release.outputs.skip != 'true'
        run: |
          TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q '.tagName')
          echo "Latest release tag: $TAG"
          if [ -z "$TAG" ]; then
            echo "ERROR: No release found"
            exit 1
          fi

      - name: Verify critical assets exist
        if: steps.public_release.outputs.skip != 'true'
        run: |
          ASSETS=$(gh release view --repo ${{ github.repository }} --json assets -q '.assets[].name')
          echo "Release assets:"
          echo "$ASSETS"

          echo "$ASSETS" | grep -q "windows-x64.exe$" \
            || { echo "ERROR: portable EXE is missing"; exit 1; }

          echo "$ASSETS" | grep -q "windows-x64.exe.sig$" \
            || { echo "ERROR: updater signature (.sig) is missing"; exit 1; }

          echo "$ASSETS" | grep -q "\.sha256$" \
            || { echo "ERROR: SHA256 checksum file is missing"; exit 1; }

          echo "$ASSETS" | grep -q "latest.json" \
            || { echo "ERROR: latest.json is missing"; exit 1; }

          echo "All critical assets present."

      - name: Verify SHA256 checksum
        if: steps.public_release.outputs.skip != 'true'
        run: |
          VERSION=$(gh release view --repo ${{ github.repository }} --json tagName -q '.tagName' | sed 's/^v//')
          EXE="pay-dance-v${VERSION}-windows-x64.exe"

          gh release download --repo ${{ github.repository }} --pattern "${EXE}" --dir /tmp/smoke --clobber
          gh release download --repo ${{ github.repository }} --pattern "${EXE}.sha256" --dir /tmp/smoke --clobber

          cd /tmp/smoke
          EXPECTED=$(cat "${EXE}.sha256" | awk '{print $1}')
          ACTUAL=$(sha256sum "${EXE}" | awk '{print $1}')

          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "ERROR: SHA256 mismatch"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "SHA256 verified: $ACTUAL"

      - name: Validate latest.json structure
        if: steps.public_release.outputs.skip != 'true'
        run: |
          gh release download --repo ${{ github.repository }} --pattern latest.json --dir /tmp/smoke --clobber

          cd /tmp/smoke
          if ! jq -e '.version' latest.json > /dev/null; then
            echo "ERROR: latest.json missing 'version' field"
            exit 1
          fi
          if ! jq -e '.platforms["windows-x86_64"].url' latest.json > /dev/null; then
            echo "ERROR: latest.json missing platform download URL"
            exit 1
          fi
          if ! jq -e '.platforms["windows-x86_64"].signature | type == "string" and length > 0' latest.json > /dev/null; then
            echo "ERROR: latest.json missing non-empty platform signature"
            exit 1
          fi
          echo "latest.json structure valid."

      - name: Verify latest.json points at the checksummed asset
        if: steps.public_release.outputs.skip != 'true'
        run: |
          VERSION=$(gh release view --repo ${{ github.repository }} --json tagName -q '.tagName' | sed 's/^v//')
          EXE="pay-dance-v${VERSION}-windows-x64.exe"
          EXPECTED_URL="https://github.com/${{ github.repository }}/releases/latest/download/${EXE}"

          cd /tmp/smoke
          URL=$(jq -r '.platforms["windows-x86_64"].url' latest.json)
          if [ "$URL" != "$EXPECTED_URL" ]; then
            echo "ERROR: latest.json points at unexpected asset URL"
            echo "  expected: $EXPECTED_URL"
            echo "  actual:   $URL"
            exit 1
          fi

          EXPECTED_SHA=$(cat "${EXE}.sha256" | awk '{print $1}')
          ACTUAL_SHA=$(sha256sum "${EXE}" | awk '{print $1}')
          if [ "$EXPECTED_SHA" != "$ACTUAL_SHA" ]; then
            echo "ERROR: latest.json asset SHA256 mismatch"
            echo "  expected: $EXPECTED_SHA"
            echo "  actual:   $ACTUAL_SHA"
            exit 1
          fi

          ASSET_DIGEST=$(jq -r --arg name "$EXE" '.assets[] | select(.name == $name) | .digest // ""' "${{ github.workspace }}/latest-release.json")
          if [ -n "$ASSET_DIGEST" ] && [ "$ASSET_DIGEST" != "null" ]; then
            echo "GitHub asset digest: $ASSET_DIGEST"
            NORMALIZED_DIGEST="${ASSET_DIGEST#sha256:}"
            if [ "$NORMALIZED_DIGEST" != "$ACTUAL_SHA" ]; then
              echo "ERROR: GitHub asset digest does not match downloaded executable"
              echo "  expected: $NORMALIZED_DIGEST"
              echo "  actual:   $ACTUAL_SHA"
              exit 1
            fi
          else
            echo "GitHub asset digest unavailable; SHA256 sidecar verified."
          fi

      - name: Verify latest.json download URL is accessible
        if: steps.public_release.outputs.skip != 'true'
        run: |
          URL=$(jq -r '.platforms["windows-x86_64"].url' /tmp/smoke/latest.json)
          echo "Checking: $URL"
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" "$URL")
          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 302 ]; then
            echo "ERROR: Download URL returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Download URL accessible (HTTP $HTTP_CODE)."

      - name: Verify README download link
        if: steps.public_release.outputs.skip != 'true'
        run: |
          VERSION=$(gh release view --repo ${{ github.repository }} --json tagName -q '.tagName' | sed 's/^v//')
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/latest/download/pay-dance-v${VERSION}-windows-x64.exe"
          echo "Checking: $DOWNLOAD_URL"
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" "$DOWNLOAD_URL")
          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 302 ]; then
            echo "ERROR: README download link returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Download link accessible (HTTP $HTTP_CODE)."
