name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 2 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect CodeQL change scope
    runs-on: ubuntu-latest
    outputs:
      requires_full_ci: ${{ steps.scope.outputs.requires_full_ci }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Detect change scope
        id: scope
        run: |
          base="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          head="${{ github.sha }}"
          node scripts/ci-change-scope.mjs \
            --base "$base" \
            --head "$head" \
            --github-output "$GITHUB_OUTPUT"

  analyze:
    name: Analyze ${{ matrix.language }}
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.requires_full_ci == 'true'
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - rust

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          build-mode: none
          languages: ${{ matrix.language }}

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

  gate:
    name: CodeQL gate
    if: always()
    needs:
      - changes
      - analyze
    runs-on: ubuntu-latest

    steps:
      - name: Verify all language scans
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          REQUIRES_FULL_CI: ${{ needs.changes.outputs.requires_full_ci }}
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            exit 1
          fi

          if [ "$REQUIRES_FULL_CI" = "true" ]; then
            test "$ANALYZE_RESULT" = "success"
            exit
          fi

          if [ "$ANALYZE_RESULT" != "skipped" ] && [ "$ANALYZE_RESULT" != "success" ]; then
            exit 1
          fi
