name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.5.14"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    name: Build Windows release
    runs-on: windows-2022
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run version:check
        env:
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}

      - name: Check repository hygiene
        run: npm run check:hygiene

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Build NSIS installer (with updater artifacts)
        run: npm run build:installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVKEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVKEY_PASSWORD }}

      - name: Assert desktop frontend target
        run: node scripts/assert-build-target.mjs desktop && node scripts/assert-build-boundary.mjs desktop

      - name: Prepare versioned release assets
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_TAG }}".TrimStart("v")

          # Portable EXE
          $exePath = "src-tauri/target/release/pay-dance.exe"
          $portableName = "pay-dance-v$version-windows-x64.exe"
          $portablePath = "src-tauri/target/release/$portableName"
          Copy-Item $exePath $portablePath -Force
          $portableHash = (Get-FileHash $portablePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$portableHash  $portableName" | Out-File -Encoding ascii "$portablePath.sha256"

          # NSIS installer (generated by tauri build; filename uses productName "薪跳")
          $installerGlob = "src-tauri/target/release/bundle/nsis/*_x64-setup.exe"
          $installerPath = Get-ChildItem $installerGlob | Select-Object -First 1 -ExpandProperty FullName
          $installerName = "pay-dance_$($version)_x64-setup.exe"
          $installerDest = "release-assets/$installerName"
          New-Item -ItemType Directory -Force -Path release-assets
          Copy-Item $installerPath $installerDest -Force
          $installerHash = (Get-FileHash $installerDest -Algorithm SHA256).Hash.ToLowerInvariant()
          "$installerHash  $installerName" | Out-File -Encoding ascii "$installerDest.sha256"

          # Updater signature
          $sigPath = "$installerPath.sig"
          if (Test-Path $sigPath) {
            Copy-Item $sigPath "release-assets/$installerName.sig" -Force
          }

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_TAG }}".TrimStart("v")
          $sigFile = "release-assets/pay-dance_$($version)_x64-setup.exe.sig"
          $sigArg = if (Test-Path $sigFile) { "--sig-file $sigFile" } else { "" }
          $notesArg = if (Test-Path release-notes.md) { "--notes-file release-notes.md" } else { "" }

          node scripts/release/build-latest-json.mjs `
            --version $version `
            $sigArg `
            $notesArg `
            --installer-url "https://github.com/MasterBao66/PayDance/releases/latest/download/pay-dance_$($version)_x64-setup.exe" `
          | Out-File -Encoding utf8 release-assets/latest.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pay-dance-windows-release
          path: |
            src-tauri/target/release/pay-dance-v*-windows-x64.exe
            src-tauri/target/release/pay-dance-v*-windows-x64.exe.sha256
            release-assets/pay-dance_*_x64-setup.exe
            release-assets/pay-dance_*_x64-setup.exe.sha256
            release-assets/pay-dance_*_x64-setup.exe.sig
            release-assets/latest.json
          if-no-files-found: error

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: node scripts/extract-release-notes.mjs --version "${{ env.RELEASE_TAG }}" --output release-notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          name: 薪跳 PayDance ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: |
            src-tauri/target/release/pay-dance-v*-windows-x64.exe
            src-tauri/target/release/pay-dance-v*-windows-x64.exe.sha256
            release-assets/pay-dance_*_x64-setup.exe
            release-assets/pay-dance_*_x64-setup.exe.sha256
            release-assets/pay-dance_*_x64-setup.exe.sig
            release-assets/latest.json
