name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.5.14"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    name: Build Windows release
    runs-on: windows-2022
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run version:check
        env:
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}

      - name: Check repository hygiene
        run: npm run check:hygiene

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Build portable EXE
        run: npm run build:exe

      - name: Assert desktop frontend target
        run: node scripts/assert-build-target.mjs desktop && node scripts/assert-build-boundary.mjs desktop

      - name: Prepare versioned release assets
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_TAG }}".TrimStart("v")
          $exePath = "src-tauri/target/release/pay-dance.exe"
          $assetName = "pay-dance-v$version-windows-x64.exe"
          $assetPath = "src-tauri/target/release/$assetName"
          Copy-Item $exePath $assetPath -Force
          $hash = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $assetName" | Out-File -Encoding ascii "$assetPath.sha256"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            src-tauri/target/release/pay-dance-v*-windows-x64.exe
            src-tauri/target/release/pay-dance-v*-windows-x64.exe.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pay-dance-windows-exe
          path: |
            src-tauri/target/release/pay-dance-v*-windows-x64.exe
            src-tauri/target/release/pay-dance-v*-windows-x64.exe.sha256
          if-no-files-found: error

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: node scripts/extract-release-notes.mjs --version "${{ env.RELEASE_TAG }}" --output release-notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          name: 薪跳 PayDance ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: |
            src-tauri/target/release/pay-dance-v*-windows-x64.exe
            src-tauri/target/release/pay-dance-v*-windows-x64.exe.sha256
