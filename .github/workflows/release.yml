name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.5.14"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    name: Build Windows release
    runs-on: windows-2022
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run version:check
        env:
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}

      - name: Check repository hygiene
        run: npm run check:hygiene

      - name: Run unit tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Build portable EXE
        run: npm run build:exe

      - name: Generate checksum
        shell: pwsh
        run: |
          $exePath = "src-tauri/target/release/pay-dance.exe"
          $hash = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  pay-dance.exe" | Out-File -Encoding ascii "$exePath.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pay-dance-windows-exe
          path: |
            src-tauri/target/release/pay-dance.exe
            src-tauri/target/release/pay-dance.exe.sha256
          if-no-files-found: error

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/extract-release-notes.ps1 -Version "${{ env.RELEASE_TAG }}" -OutputPath release-notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          name: 薪跳 PayDance ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: |
            src-tauri/target/release/pay-dance.exe
            src-tauri/target/release/pay-dance.exe.sha256
