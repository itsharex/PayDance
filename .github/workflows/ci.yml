name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test and build
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run version:check

      - name: Check repository hygiene
        run: npm run check:hygiene

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build Web Preview
        run: npm run build:web

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Audit production dependencies
        run: npm audit --omit=dev

  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks (pre-built)
        run: |
          version="8.24.3"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks (detect secrets in git history)
        run: gitleaks detect --config .gitleaks.toml --verbose

      - name: Install cargo-audit (pre-built)
        run: |
          version="0.22.1"
          url="https://github.com/rustsec/rustsec/releases/download/cargo-audit/v${version}/cargo-audit-x86_64-unknown-linux-gnu-v${version}.tgz"
          expected_sha="1890badd5f15831a9af4b074399fcd21e6f7c0fe42c84e9254cdffc9f813765c"
          curl -fsSL "$url" -o cargo-audit.tgz
          echo "${expected_sha}  cargo-audit.tgz" | sha256sum -c -
          tar -xzf cargo-audit.tgz
          sudo mv "cargo-audit-x86_64-unknown-linux-gnu-v${version}/cargo-audit" /usr/local/bin/

      - name: Audit Rust dependencies
        run: cargo audit
        working-directory: src-tauri

      - name: Install cargo-deny (pre-built)
        run: |
          version="0.19.8"
          url="https://github.com/EmbarkStudios/cargo-deny/releases/download/${version}/cargo-deny-${version}-x86_64-unknown-linux-musl.tar.gz"
          expected_sha="70e769ae3872e34d45132b17040859175e11401dc12dddb0303e0b8c7d088f3f"
          curl -fsSL "$url" -o cargo-deny.tar.gz
          echo "${expected_sha}  cargo-deny.tar.gz" | sha256sum -c -
          tar -xzf cargo-deny.tar.gz
          sudo mv "cargo-deny-${version}-x86_64-unknown-linux-musl/cargo-deny" /usr/local/bin/

      - name: Check Rust dependency licenses and sources
        run: cargo deny check
        working-directory: src-tauri
