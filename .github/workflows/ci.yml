name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test and build
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run version:check

      - name: Check repository hygiene
        run: npm run check:hygiene

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build Web Preview
        run: npm run build:web

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Check Tauri backend
        run: cargo check
        working-directory: src-tauri

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Install gitleaks
        run: choco install gitleaks -y --no-progress

      - name: Run gitleaks (detect secrets in git history)
        run: gitleaks detect --config .gitleaks.toml --verbose

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
        working-directory: src-tauri

      - name: Audit Rust dependencies
        run: cargo audit
        working-directory: src-tauri

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
        working-directory: src-tauri

      - name: Check Rust dependency licenses and sources
        run: cargo deny check
        working-directory: src-tauri

      - name: Audit production dependencies
        run: npm audit --omit=dev
