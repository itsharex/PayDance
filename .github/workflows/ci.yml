name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.scope.outputs.scope }}
      is_lightweight: ${{ steps.scope.outputs.is_lightweight }}
      requires_full_ci: ${{ steps.scope.outputs.requires_full_ci }}
      requires_windows_build: ${{ steps.scope.outputs.requires_windows_build }}
      deploy_web_preview: ${{ steps.scope.outputs.deploy_web_preview }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Detect change scope
        id: scope
        run: |
          base="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          head="${{ github.sha }}"
          node scripts/ci-change-scope.mjs \
            --base "$base" \
            --head "$head" \
            --github-output "$GITHUB_OUTPUT" \
            --json-file ci-change-scope.json

      - name: Upload change scope artifact
        uses: actions/upload-artifact@v7
        with:
          name: ci-change-scope
          path: ci-change-scope.json
          if-no-files-found: error

  metadata:
    name: Metadata, format, and hygiene
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run metadata verification
        run: npm run verify:metadata

  verify:
    name: Test and build
    needs:
      - changes
      - metadata
    if: needs.changes.outputs.requires_full_ci == 'true'
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build Web Preview
        run: npm run build:web

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Web Preview QA
        run: npm run qa:web-preview

      - name: Upload Web Preview QA evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: web-preview-qa-evidence
          path: ${{ runner.temp }}/paydance-web-preview-qa-*
          if-no-files-found: ignore

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Audit production dependencies
        run: npm audit --omit=dev

  security:
    name: Security audit
    needs:
      - changes
      - metadata
    if: needs.changes.outputs.requires_full_ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks (pre-built)
        run: |
          version="8.24.3"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks (detect secrets in git history)
        run: gitleaks detect --config .gitleaks.toml --verbose

      - name: Install cargo-audit (pre-built)
        run: |
          version="0.22.1"
          url="https://github.com/rustsec/rustsec/releases/download/cargo-audit/v${version}/cargo-audit-x86_64-unknown-linux-gnu-v${version}.tgz"
          expected_sha="1890badd5f15831a9af4b074399fcd21e6f7c0fe42c84e9254cdffc9f813765c"
          curl -fsSL "$url" -o cargo-audit.tgz
          echo "${expected_sha}  cargo-audit.tgz" | sha256sum -c -
          tar -xzf cargo-audit.tgz
          sudo mv "cargo-audit-x86_64-unknown-linux-gnu-v${version}/cargo-audit" /usr/local/bin/

      - name: Audit Rust dependencies
        run: cargo audit
        working-directory: src-tauri

      - name: Install cargo-deny (pre-built)
        run: |
          version="0.19.8"
          url="https://github.com/EmbarkStudios/cargo-deny/releases/download/${version}/cargo-deny-${version}-x86_64-unknown-linux-musl.tar.gz"
          expected_sha="70e769ae3872e34d45132b17040859175e11401dc12dddb0303e0b8c7d088f3f"
          curl -fsSL "$url" -o cargo-deny.tar.gz
          echo "${expected_sha}  cargo-deny.tar.gz" | sha256sum -c -
          tar -xzf cargo-deny.tar.gz
          sudo mv "cargo-deny-${version}-x86_64-unknown-linux-musl/cargo-deny" /usr/local/bin/

      - name: Check Rust dependency licenses and sources
        run: cargo deny check
        working-directory: src-tauri
