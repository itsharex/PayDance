# Gitleaks configuration for PayDance
# Scans git history and working tree for hardcoded secrets

title = "PayDance gitleaks config"

[allowlist]
  description = "Global allowlist"
  paths = [
    # Exclude auto-generated and binary files
    "src-tauri/icons/",
    "src-tauri/target/",
    "node_modules/",
    # Exclude test fixtures with fake keys
    "\\.test\\.ts$",
    "\\.test\\.js$",
    "\\.snap$",
    # Lock files
    "package-lock\\.json$",
    "Cargo\\.lock$",
    # Mock files
    "src/__mocks__/",
  ]
