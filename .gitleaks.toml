# Gitleaks configuration for PayDance.
# Scans git history and the working tree for hardcoded secrets.
title = "PayDance gitleaks config"

[allowlist]
description = "Global allowlist"
paths = [
  # Auto-generated, vendored, or binary-heavy directories.
  "src-tauri/icons/",
  "src-tauri/target/",
  "node_modules/",

  # Tests and snapshots only contain fake fixtures.
  "\\.test\\.ts$",
  "\\.test\\.js$",
  "\\.snap$",
  "src/__mocks__/",

  # Lock files are reviewed by package managers and security tooling.
  "package-lock\\.json$",
  "Cargo\\.lock$",
]
